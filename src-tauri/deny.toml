# cargo-deny configuration. Run: `cargo deny check` in src-tauri/.
# Separately run: `cargo audit` for RUSTSEC advisories.

[advisories]
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Explicitly allow only known-good crypto crates in the tree.
deny = [
    # Deprecated / unmaintained crypto:
    { name = "openssl", reason = "we use RustCrypto — no OpenSSL" },
    { name = "ring", reason = "prefer RustCrypto primitives for consistency" },
    { name = "rust-crypto", reason = "unmaintained legacy crate" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
